# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
 
name: .NET
 
on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
 
jobs:
  build:
    runs-on: ubuntu-latest
    env:
     PROJECT_FOLDER: "RabbitMqProductAPI"
    
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x # Specify .NET 8.0 explicitly
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
 
    - name: Publish build output
      run: dotnet publish --no-restore --configuration Release --output ./publish

    - name: install dotnet ef
      run: dotnet tool install -g dotnet-ef --version 9.0.1
      
    - name: create /myapp/migrate folder if not existing
      run: mkdir -p RabbitMqProductAPI/myapp

      
    - name: dotnet bundle migration
      run: dotnet ef migrations bundle --runtime linux-x64 -p ${{env.PROJECT_FOLDER}}/RabbitMqProductAPI.csproj -o ${{env.PROJECT_FOLDER}}/myapp/migrate
 
    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: build-artifact
        path: ./publish


  deploy:
    runs-on: ubuntu-latest
    needs: build  # s'éxécute que si build fini
    environment:
      name: "Production"
    steps:
    - name: Download artifact for build job
      uses: actions/download-artifact@v3
      with:
        name: build-artifact
 
    - name: Deploy to Azure web App
      run: echo "Deploying to Azure web App"



